name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Lint PHP files
        run: |
          php -l content-extractor.php
          php -l functions.php

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from plugin file
        id: get_version
        run: |
          VERSION=$(grep -i "Version:" content-extractor.php | head -1 | awk '{print $2}' | tr -d '\r\n')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: steps.get_version.outputs.version != ''
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## WP Content Extractor v${{ steps.get_version.outputs.version }}
            
            See [CHANGELOG.md](CHANGELOG.md) for details.
            
            ### Installation
            1. Download the plugin ZIP from the releases page
            2. Upload to WordPress via Plugins → Add New → Upload Plugin
            3. Activate the plugin
            4. Configure via Settings → Content Extractor
            
            ### Files
            - `content-extractor.php` - Main plugin file
            - `functions.php` - Core functions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
